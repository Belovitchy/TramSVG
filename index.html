<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tramage d'image</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <label for="imageLoader">Choisissez une image:</label>
        <input type="file" id="imageLoader" name="imageLoader" accept="image/*">
        
        <label for="pixelSize">Taille de la trame (pixels):</label>
        <input type="number" id="pixelSize" name="pixelSize" value="20" min="1">
        
        <div class="color-picker-wrapper">
            <label for="backgroundColor">Couleur de fond:</label>
            <input type="color" id="backgroundColor" name="backgroundColor" value="#FFFFFF">
        </div>
        
        <button id="processButton">Générer</button>
        <button id="downloadPNGButton">Télécharger en PNG</button>
        <button id="downloadJPEGButton">Télécharger en JPEG</button>
        <button id="downloadSVGButton">Télécharger en SVG</button>

        <div id="svgControls">
            <!-- Les contrôles pour chaque SVG seront insérés ici par JavaScript -->
        </div>
    </div>
    
    <div class="canvases">
        <div>
            <h2>Originale <span id="sourceDimensions"></span></h2>
            <canvas id="sourceCanvas"></canvas>
        </div>
        <div>
            <h2>Résultat <span id="resultDimensions"></span></h2>
            <canvas id="resultCanvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
